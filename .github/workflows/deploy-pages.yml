name: Commit catalog site files

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-files
  cancel-in-progress: true

jobs:
  publish-files:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download and unpack site
        run: |
          curl -L --fail --retry 3 --output site.zip "https://tmpfiles.org/dl/1783502194.4294879a641b1ae6/w2wX3KnccsiM/mechanik-github-pages.zip"
          mkdir /tmp/site
          unzip -q site.zip -d /tmp/site
          test -f /tmp/site/index.html

      - name: Replace repository content
        run: |
          find . -mindepth 1 \
            ! -path './.git' ! -path './.git/*' \
            ! -path './.github' ! -path './.github/*' \
            -exec rm -rf {} +
          cp -R /tmp/site/. .
          touch .nojekyll

      - name: Commit site files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish catalog site files [skip ci]" || exit 0
          git push
