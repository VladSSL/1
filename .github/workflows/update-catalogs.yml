name: Update catalog pages from PDFs

on:
  push:
    branches:
      - main
    paths:
      - docs/machines.pdf
      - docs/materials.pdf
      - scripts/build-catalog-assets.mjs
      - .github/workflows/update-catalogs.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild-catalog-pages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install PDF tools
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Rebuild catalog page images
        run: node scripts/build-catalog-assets.mjs

      - name: Commit regenerated files
        run: |
          if git diff --quiet; then
            echo "No catalog changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A docs/machines/pages docs/materials/pages site.js
          git commit -m "Regenerate catalog pages from PDFs"
          git push
